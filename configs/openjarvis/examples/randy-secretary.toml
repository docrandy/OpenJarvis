# Randy's Secretary — Cloud-only nano/Sonnet hybrid
# Copy to ~/.openjarvis/config.toml
#
# Uses GPT-4.1-nano for simple tasks, Claude Sonnet for complex ones.
# Requires: OPENAI_API_KEY and ANTHROPIC_API_KEY in .env
#
# Usage:
#   jarvis ask "Summarize my unread emails"
#   jarvis chat                  # interactive session
#   jarvis serve                 # start API server

[engine]
default = "cloud"

[intelligence]
default_model = "gpt-4.1-nano"            # Cheap default for simple tasks ($0.05/$0.20 per MTok)
fallback_model = "claude-sonnet-4-6"      # Escalate to Sonnet for complex/multi-tool work
temperature = 0.7
max_tokens = 4096

[agent]
default_agent = "orchestrator"             # Multi-turn reasoning with automatic tool selection
max_turns = 10
tools = "web_search,calculator,think"
objective = "Act as a personal secretary — manage email, calendar, research, and scheduling tasks"

[tools.storage]
default_backend = "sqlite"
db_path = "~/.openjarvis/memory.db"

[tools.mcp]
enabled = true

[telemetry]
enabled = true
db_path = "~/.openjarvis/telemetry.db"

[traces]
enabled = true
db_path = "~/.openjarvis/traces.db"

[server]
host = "127.0.0.1"
port = 8000
agent = "orchestrator"

[security]
enabled = true
